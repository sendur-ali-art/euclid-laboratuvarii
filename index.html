<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euclid Laboratuvarı - Yapay Zeka Destekli Geometri</title>
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: #f0f2f5;
        }
        #ggb-container {
            flex: 2;
            border-right: 2px solid #ccc;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            box-shadow: -2px 0 5px rgba(0,0,0,0.1);
        }
        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            border-bottom: 1px solid #eee;
        }
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 10px;
            max-width: 80%;
            line-height: 1.4;
        }
        .user-message {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .ai-message {
            background-color: #e9ecef;
            color: #333;
            align-self: flex-start;
        }
        #input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background-color: #f8f9fa;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

    <div id="ggb-container">
        <div id="ggbApplet"></div>
    </div>

    <div id="chat-container">
        <div style="padding: 15px; background: #343a40; color: white; text-align: center;">
            <h3>Euclid Laboratuvarı</h3>
            <p style="font-size: 0.8rem; opacity: 0.8;">Sadece Pergel ve Cetvel Kullan!</p>
        </div>
        <div id="chat-history">
            <div class="message ai-message">
                Merhaba! Ben Euclid Asistanı. Pergel ve cetvel inşalarında sana rehberlik etmek için buradayım. Ne çizmek istersin?
            </div>
        </div>
        <div id="input-area">
            <input type="text" id="user-input" placeholder="Örn: Bir doğru parçası çiz..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Gönder</button>
        </div>
    </div>

    <script>
        // GeoGebra Parametreleri
        var parameters = {
            "id": "ggbApplet",
            "width": 800,
            "height": 600,
            "showToolBar": true,
            "borderColor": null,
            "showMenuBar": true,
            "showAlgebraInput": true,  
            "showAlgebraView": true, // CEBİR PENCERESİ AÇIK
            "allowStyleBar": true,
            "showResetIcon": true,
            "enableLabelDrags": false,
            "enableShiftDragZoom": true,
            "enableRightClick": false,
            "capturingThreshold": null,
            "showToolBarHelp": false,
            "errorDialogsActive": true,
            "useBrowserForJS": false,
            "appName": "geometry" 
        };

        var applet = new GGBApplet(parameters, true);
        
        window.onload = function() {
            applet.inject('ggbApplet');
        };

        // Sohbet Geçmişi
        let chatHistory = [];

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            // Kullanıcı mesajını ekrana bas
            addMessage(message, 'user-message');
            inputField.value = '';

            // Geçmişe ekle
            chatHistory.push({ role: "user", content: message });

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: chatHistory })
                });

                const data = await response.json();

                // AI Mesajını ekrana bas
                if (data.message) {
                    addMessage(data.message, 'ai-message');
                    chatHistory.push({ role: "assistant", content: data.message });
                }

                // GeoGebra komutlarını çalıştır
                if (data.commands && data.commands.length > 0) {
                    const ggbApp = window.ggbApplet; 
                    data.commands.forEach(cmd => {
                        console.log("Çalıştırılıyor:", cmd);
                        ggbApp.evalCommand(cmd);
                    });
                }

            } catch (error) {
                console.error('Hata:', error);
                addMessage("Bağlantı hatası oluştu.", 'ai-message');
            }
        }

        function addMessage(text, className) {
            const historyDiv = document.getElementById('chat-history');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.textContent = text;
            historyDiv.appendChild(msgDiv);
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
