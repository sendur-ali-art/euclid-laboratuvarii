<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Euclid Laboratuvarı</title>
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: #f4f4f9;
        }

        /* ÜST MENÜ (GERİ GELDİ) */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        h1 { margin: 0; font-size: 1.2rem; }

        .header-buttons button {
            background-color: #34495e;
            color: white;
            border: 1px solid #7f8c8d;
            padding: 5px 15px;
            margin-left: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
        }
        .header-buttons button:hover { background-color: #1abc9c; border-color: #16a085; }
        .header-buttons button.danger:hover { background-color: #e74c3c; border-color: #c0392b; }

        /* ANA GÖVDE */
        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* GEOGEBRA ALANI */
        #ggb-container {
            flex: 2; /* Geniş alan */
            border-right: 1px solid #ccc;
            position: relative;
        }

        /* SOHBET ALANI */
        #chat-panel {
            flex: 1; /* Dar alan */
            display: flex;
            flex-direction: column;
            background: white;
            max-width: 400px;
            min-width: 300px;
            transition: all 0.3s ease;
        }
        
        /* Sohbet Gizlendiğinde */
        #chat-panel.hidden {
            margin-right: -400px; /* Ekran dışına it */
        }

        #chat-history {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f9f9f9;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.4;
            max-width: 85%;
        }
        .user-message {
            background-color: #3498db;
            color: white;
            align-self: flex-end;
            margin-left: auto;
        }
        .ai-message {
            background-color: #ecf0f1;
            color: #2c3e50;
            border: 1px solid #bdc3c7;
        }

        #input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }
        #user-input:focus { border-color: #3498db; outline: none; }
        #send-btn {
            padding: 10px 20px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #send-btn:hover { background-color: #2ecc71; }

    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span>📐</span>
            <h1>Euclid Laboratuvarı</h1>
        </div>
        <div class="header-buttons">
            <button onclick="toggleChat()">💬 Sohbeti Aç/Kapat</button>
            <button onclick="downloadGGB()">💾 Kaydet (.ggb)</button>
            <button class="danger" onclick="resetBoard()">🗑️ Temizle</button>
        </div>
    </header>

    <div id="main-container">
        <div id="ggb-container">
            <div id="ggbApplet"></div>
        </div>

        <div id="chat-panel">
            <div id="chat-history">
                <div class="message ai-message">
                    Merhaba! Ben Euclid Asistanı. Pergel ve cetvel inşalarında sana rehberlik etmek için buradayım.
                    <br><br>
                    <i>(Sol tarafta Cebir Penceresinden noktaların koordinatlarını görebilirsin.)</i>
                </div>
            </div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Örn: A ve B noktası koy..." onkeypress="handleKeyPress(event)">
                <button id="send-btn" onclick="sendMessage()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        // --- GEOGEBRA AYARLARI ---
        var parameters = {
            "id": "ggbApplet",
            "width": 800,  // Başlangıç değeri (CSS ile override edilir)
            "height": 600,
            "showToolBar": false,        // ARAÇ KUTUSU GİZLENDİ (Temiz Görünüm)
            "borderColor": null,
            "showMenuBar": false,        // GGB Menüsü Gizli
            "showAlgebraInput": false,   // Alttaki giriş çubuğu gizli
            "showAlgebraView": true,     // CEBİR PENCERESİ AÇIK (İstediğin bu)
            "allowStyleBar": true,       // Renk değiştirme vs. için küçük bar
            "showResetIcon": true,
            "enableLabelDrags": true,
            "enableShiftDragZoom": true,
            "enableRightClick": true,
            "appName": "geometry"
        };

        var applet = new GGBApplet(parameters, true);
        
        window.onload = function() {
            applet.inject('ggbApplet');
        };

        // --- SOHBET VE BUTON FONKSİYONLARI ---

        let chatHistory = [];

        async function sendMessage() {
            const inputField = document.getElementById('user-input');
            const message = inputField.value.trim();
            if (!message) return;

            addMessage(message, 'user-message');
            inputField.value = '';

            chatHistory.push({ role: "user", content: message });

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: chatHistory })
                });

                const data = await response.json();

                if (data.message) {
                    addMessage(data.message, 'ai-message');
                    chatHistory.push({ role: "assistant", content: data.message });
                }

                if (data.commands && data.commands.length > 0) {
                    const ggbApp = window.ggbApplet; 
                    data.commands.forEach(cmd => {
                        ggbApp.evalCommand(cmd);
                    });
                }

            } catch (error) {
                console.error('Hata:', error);
                addMessage("Sunucuyla iletişim kurulamadı.", 'ai-message');
            }
        }

        function addMessage(text, className) {
            const historyDiv = document.getElementById('chat-history');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerHTML = text; // HTML desteği (Satır başı için)
            historyDiv.appendChild(msgDiv);
            historyDiv.scrollTop = historyDiv.scrollHeight;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        // --- ÜST MENÜ BUTONLARI ---

        function resetBoard() {
            if(confirm("Tüm çizimi silmek istediğine emin misin?")) {
                ggbApplet.reset();
                chatHistory = []; // Sohbet hafızasını da sıfırla
                document.getElementById('chat-history').innerHTML = 
                    '<div class="message ai-message">Tahta temizlendi. Yeni bir çizime başlayalım!</div>';
            }
        }

        function downloadGGB() {
            ggbApplet.getBase64(function(base64) {
                var link = document.createElement('a');
                link.href = 'data:application/vnd.geogebra.file;base64,' + base64;
                link.download = 'euclid-calismam.ggb';
                link.click();
            });
        }

        function toggleChat() {
            const panel = document.getElementById('chat-panel');
            panel.classList.toggle('hidden');
        }

    </script>
</body>
</html>
